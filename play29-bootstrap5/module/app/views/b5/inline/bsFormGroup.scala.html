@(contentHtml: Html, argsMap: Map[Symbol, Any])(implicit msgsProv: MessagesProvider)
@b5.bsFormGroupCommon(contentHtml, bs.ArgsMap.withAddingStringValue(argsMap, Symbol("_class"), "col-12")) { content =>
	@argsMap.get(Symbol("_label")).map { label =>
		<label class="form-label@if(bs.ArgsMap.isTrue(argsMap, Symbol("_hideLabel"))){ visually-hidden}">@bs.Args.msg(label)(msgsProv)</label>
	}
	@content
}
