@(field: Field, args: (Symbol,Any)*)(implicit fc: b5.B5FieldConstructor, msgsProv: MessagesProvider)
@inputFormGroup(field, withLabelFor = true, args) { fieldInfo =>
    <input type="file" id="@fieldInfo.id" name="@fieldInfo.name" value="@fieldInfo.value" @toHtmlArgs(bs.ArgsMap.withAddingStringValue(fieldInfo.innerArgsMap, Symbol("class"), "form-control"))>
}(fc, msgsProv)
